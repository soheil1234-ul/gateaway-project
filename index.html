<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status | Cloud Integration</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border: 1px solid #333;
            padding: 40px;
            border-radius: 12px;
            background: #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #00ff88;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #00ff88;
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #888; font-size: 0.9rem; }
        .stats {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="status-dot"></span> API Gateway Operational</h1>
        <p>Service integration is active and monitoring traffic.</p>
        <div class="stats">
            <span>Uptime: 99.9%</span>
            <span>Latency: 14ms</span>
            <span>Node: Edge-V2</span>
        </div>
    </div>
</body>
</html>
